<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Advanced Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <div class="fixed inset-0 -z-10">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-blue-600/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-600/20 rounded-full blur-[120px]"></div>
    </div>

    <nav class="p-6">
        <div class="max-w-5xl mx-auto glass rounded-2xl p-4 flex justify-between items-center">
            <span class="font-bold tracking-tighter">DEVELOPER.EXE</span>
            <div class="space-x-6 text-sm text-gray-400">
                <a href="#" class="hover:text-white transition">Projects</a>
                <a href="#" class="hover:text-white transition">Contact</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pt-32 text-center">
        <div class="inline-block px-3 py-1 rounded-full glass text-xs text-green-400 mb-6 border border-green-500/20">
            ● Available for Work
        </div>
        <h1 class="text-6xl md:text-8xl font-black tracking-tight mb-6">
            HELLO, I'M <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">YOUR NAME</span>
        </h1>
        <p class="mono text-gray-500 max-w-xl mx-auto mb-10">
            > Initializing creative_developer.sys ... <br>
            > Specializing in minimalist design and clean code.
        </p>
        <div class="flex justify-center gap-4">
            <button class="bg-white text-black px-8 py-3 rounded-xl font-bold hover:bg-blue-400 transition">Get in Touch</button>
            <button class="glass px-8 py-3 rounded-xl font-bold hover:bg-white/10 transition">View GitHub</button>
        </div>
    </main>

</body>
</html>
